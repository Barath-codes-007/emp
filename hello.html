<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine? ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
}

.container{
background:white;
padding:50px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.25);
width:90%;
max-width:500px;
position:relative;
transition:.5s;
}

h1{
font-size:2.2rem;
color:#ff3b6b;
margin-bottom:15px;
}

p{
font-size:18px;
color:#555;
margin-bottom:35px;
}

.buttons{
position:relative;
height:80px;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
transition:.3s;
position:absolute;
}

#yesBtn{
left:80px;
background:#ff3b6b;
color:white;
box-shadow:0 10px 25px rgba(255,59,107,.4);
}

#yesBtn:hover{
transform:scale(1.1);
}

#noBtn{
right:80px;
background:#555;
color:white;
}

.success{
display:none;
animation:pop .7s ease;
}

.success h2{
font-size:42px;
color:#ff3b6b;
margin-bottom:20px;
}

.success p{
font-size:20px;
}

@keyframes pop{
0%{transform:scale(.4);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.heart{
position:fixed;
font-size:25px;
animation:floatUp 6s linear infinite;
opacity:.8;
pointer-events:none;
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

canvas{
position:fixed;
left:0;
top:0;
pointer-events:none;
}
</style>

</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">

<div id="question">

<h1>❤️ Will You Be My Valentine? ❤️</h1>

<p>You make every day brighter...<br>Will you be my Valentine?</p>

<div class="buttons">

<button id="yesBtn">Yes ❤️</button>

<button id="noBtn">No 💔</button>

</div>

</div>

<div class="success" id="success">

<h2>🎉 YAY!! 🎉</h2>

<p>
You just made my day! ❤️<br><br>
Happy Valentine's Day! 🌹💕
</p>

</div>

</div>

<script>

const noBtn=document.getElementById("noBtn");

document.addEventListener("mousemove",(e)=>{

const rect=noBtn.getBoundingClientRect();

const x=rect.left+rect.width/2;
const y=rect.top+rect.height/2;

const dx=e.clientX-x;
const dy=e.clientY-y;

const distance=Math.sqrt(dx*dx+dy*dy);

if(distance<120){

const maxX=window.innerWidth-rect.width-20;
const maxY=window.innerHeight-rect.height-20;

const randomX=Math.random()*maxX;
const randomY=Math.random()*maxY;

noBtn.style.left=randomX+"px";
noBtn.style.top=randomY+"px";
noBtn.style.right="auto";
}

});

document.getElementById("yesBtn").onclick=function(){

document.getElementById("question").style.display="none";
document.getElementById("success").style.display="block";

startConfetti();

for(let i=0;i<50;i++){
createHeart();
}

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["❤️","💖","💕","💗","💘"][Math.floor(Math.random()*5)];

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+4)+"s";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(createHeart,500);

/////////////////////////////////////////////////////
// Confetti
/////////////////////////////////////////////////////

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

let pieces=[];

function startConfetti(){

for(let i=0;i<300;i++){

pieces.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height-canvas.height,

size:Math.random()*8+5,

speed:Math.random()*4+2,

color:`hsl(${Math.random()*360},100%,60%)`,

angle:Math.random()*360

});

}

animate();

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.fillStyle=p.color;

ctx.fillRect(p.x,p.y,p.size,p.size);

p.y+=p.speed;

p.x+=Math.sin(p.angle);

p.angle+=0.05;

});

requestAnimationFrame(animate);

}

</script>

</body>
</html>
